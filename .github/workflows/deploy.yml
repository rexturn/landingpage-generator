name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Pull & restart bot on VPS
    runs-on: ubuntu-latest

    steps:
      - name: Validasi secrets
        run: |
          missing=""
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing="$missing VPS_SSH_KEY"
          [ -z "${{ secrets.VPS_HOST }}"    ] && missing="$missing VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}"    ] && missing="$missing VPS_USER"
          [ -z "${{ secrets.APP_DIR }}"     ] && missing="$missing APP_DIR"
          [ -z "${{ secrets.SERVICE_NAME }}" ] && missing="$missing SERVICE_NAME"
          if [ -n "$missing" ]; then
            echo "ERROR: Secrets berikut belum diisi di GitHub repo:"
            for s in $missing; do echo "  - $s"; done
            echo ""
            echo "Buka: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "Semua secrets OK."

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to 
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'ENDSSH'
            set -e

            echo "=============================="
            echo " Deploy: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=============================="

            cd "${{ secrets.APP_DIR }}"

            # ── 1. Git pull ───────────────────────────────────────────────
            echo "--> Git pull..."
            git fetch origin main
            git reset --hard origin/main
            echo "    Branch  : $(git branch --show-current)"
            echo "    Commit  : $(git log -1 --oneline)"

            # ── 2. Install / update dependencies ─────────────────────────
            echo "--> Install dependencies..."
            python3 -m pip install -r requirements.txt -q --break-system-packages

            # ── 3. Restart systemd service ────────────────────────────────
            echo "--> Restart service ${{ secrets.SERVICE_NAME }}..."
            sudo systemctl daemon-reload
            sudo systemctl restart "${{ secrets.SERVICE_NAME }}"
            sleep 3

            # ── 4. Verifikasi service berjalan ────────────────────────────
            echo "--> Status service:"
            sudo systemctl status "${{ secrets.SERVICE_NAME }}" --no-pager -l

            # ── 5. Verifikasi port 5001 listen ────────────────────────────
            echo "--> Cek port 5001:"
            ss -tlnp | grep 5001 || echo "    (port 5001 tidak aktif — bot mungkin mode polling)"

            echo "=============================="
            echo " Deploy selesai!"
            echo "=============================="
          ENDSSH