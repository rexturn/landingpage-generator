<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex: Modern Minimalist & Majestic</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f8f8;
            color: #333;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            color: #222;
        }
        .hero-section {
            height: 100vh;
            background-image: url('hero.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .text-shadow-light {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }
        .btn-primary {
            background: linear-gradient(to right, #E0E0E0, #C0C0C0); /* Light Gray gradient */
            color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right, #C0C0C0, #A0A0A0); /* Slightly darker on hover */
        }
        .navbar-glass {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .feature-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .fade-in.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        .footer-gradient {
            background: linear-gradient(to top, #333333, #555555);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .animate-pulse-light {
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    if (window.scrollY > 50) {
                        setIsScrolled(true);
                    } else {
                        setIsScrolled(false);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div>
                    <Navbar isScrolled={isScrolled} />
                    <Hero />
                    <Features />
                    <HowItWorks />
                    <About />
                    <Testimonials />
                    <CallToAction />
                    <Footer />
                </div>
            );
        };

        const Navbar = ({ isScrolled }) => (
            <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'navbar-glass py-3 shadow-lg' : 'bg-transparent py-5'}`}>
                <div className="container mx-auto flex justify-between items-center px-6">
                    <a href="#" className="text-3xl font-bold text-white text-shadow-light">Rex</a>
                    <div className="hidden md:flex space-x-8">
                        <NavLink href="#features">Fitur</NavLink>
                        <NavLink href="#how-it-works">Cara Kerja</NavLink>
                        <NavLink href="#about">Tentang</NavLink>
                        <NavLink href="#testimonials">Testimoni</NavLink>
                        <NavLink href="#contact">Kontak</NavLink>
                    </div>
                    <div className="md:hidden">
                        <button className="text-white text-2xl focus:outline-none">
                            <i className="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
            </nav>
        );

        const NavLink = ({ href, children }) => (
            <a href={href} className="text-white text-lg hover:text-gray-200 transition duration-300 relative group">
                {children}
                <span className="absolute left-0 bottom-0 w-0 h-0.5 bg-white group-hover:w-full transition-all duration-300"></span>
            </a>
        );

        const Hero = () => (
            <section className="hero-section flex items-center justify-center text-center text-white">
                <div className="hero-overlay flex flex-col justify-center items-center px-4">
                    <h1 className="text-5xl md:text-7xl font-bold mb-6 leading-tight text-shadow-light animate-fade-in">
                        Rex: Megah dalam Kesederhanaan
                    </h1>
                    <p className="text-xl md:text-2xl mb-10 max-w-3xl text-shadow-light animate-fade-in">
                        Solusi modern, minimalis, dan elegan untuk kebutuhan Anda. Rasakan kemewahan yang tak lekang oleh waktu.
                    </p>
                    <button className="btn-primary py-4 px-10 rounded-full text-lg font-semibold animate-pulse-light">
                        Jelajahi Sekarang
                    </button>
                </div>
            </section>
        );

        const SectionTitle = ({ children }) => (
            <h2 className="text-4xl md:text-5xl font-bold text-center mb-12 text-gray-800 relative pb-4">
                {children}
                <span className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-24 h-1 bg-gray-400 rounded-full"></span>
            </h2>
        );

        const FadeInOnScroll = ({ children }) => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(domRef.current);
                        }
                    });
                });
                observer.observe(domRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div ref={domRef} className={`fade-in ${isVisible ? 'is-visible' : ''}`}>
                    {children}
                </div>
            );
        };

        const Features = () => (
            <section id="features" className="py-20 bg-white">
                <div className="container mx-auto px-6">
                    <SectionTitle>Fitur Unggulan Kami</SectionTitle>
                    <div className="grid md:grid-cols-3 gap-10">
                        <FadeInOnScroll>
                            <div className="feature-card bg-white rounded-xl shadow-lg overflow-hidden text-center p-6 border border-gray-100">
                                <img src="feature_1.jpg" alt="Desain Elegan" className="w-full h-48 object-cover rounded-md mb-6"/>
                                <h3 className="text-2xl font-semibold mb-4 text-gray-800">Desain Elegan</h3>
                                <p className="text-gray-600">
                                    Estetika minimalis yang memukau, dirancang untuk memberikan kesan mewah dan modern.
                                </p>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div className="feature-card bg-white rounded-xl shadow-lg overflow-hidden text-center p-6 border border-gray-100">
                                <img src="feature_2.jpg" alt="Fungsionalitas Optimal" className="w-full h-48 object-cover rounded-md mb-6"/>
                                <h3 className="text-2xl font-semibold mb-4 text-gray-800">Fungsionalitas Optimal</h3>
                                <p className="text-gray-600">
                                    Setiap elemen dioptimalkan untuk performa terbaik dan pengalaman pengguna yang luar biasa.
                                </p>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div className="feature-card bg-white rounded-xl shadow-lg overflow-hidden text-center p-6 border border-gray-100">
                                <img src="feature_3.jpg" alt="Material Premium" className="w-full h-48 object-cover rounded-md mb-6"/>
                                <h3 className="text-2xl font-semibold mb-4 text-gray-800">Material Premium</h3>
                                <p className="text-gray-600">
                                    Dibuat dengan bahan-bahan pilihan, menjamin kualitas dan durabilitas jangka panjang.
                                </p>
                            </div>
                        </FadeInOnScroll>
                    </div>
                </div>
            </section>
        );

        const HowItWorks = () => (
            <section id="how-it-works" className="py-20 bg-gray-50">
                <div className="container mx-auto px-6">
                    <SectionTitle>Bagaimana Rex Bekerja</SectionTitle>
                    <div className="grid md:grid-cols-3 gap-12 text-center">
                        <FadeInOnScroll>
                            <div className="p-6 rounded-lg">
                                <div className="text-5xl text-gray-600 mb-6 w-20 h-20 flex items-center justify-center mx-auto bg-gray-200 rounded-full shadow-md">
                                    <i className="fas fa-lightbulb"></i>
                                </div>
                                <h3 className="text-2xl font-semibold mb-3 text-gray-800">1. Konsep & Desain</h3>
                                <p className="text-gray-600">
                                    Kami memulai dengan memahami visi Anda dan menerjemahkannya ke dalam desain yang elegan dan fungsional.
                                </p>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div className="p-6 rounded-lg">
                                <div className="text-5xl text-gray-600 mb-6 w-20 h-20 flex items-center justify-center mx-auto bg-gray-200 rounded-full shadow-md">
                                    <i className="fas fa-cogs"></i>
                                </div>
                                <h3 className="text-2xl font-semibold mb-3 text-gray-800">2. Pengembangan Akurat</h3>
                                <p className="text-gray-600">
                                    Dengan presisi tinggi, kami membangun setiap detail untuk memastikan kualitas dan performa terbaik.
                                </p>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div className="p-6 rounded-lg">
                                <div className="text-5xl text-gray-600 mb-6 w-20 h-20 flex items-center justify-center mx-auto bg-gray-200 rounded-full shadow-md">
                                    <i className="fas fa-check-circle"></i>
                                </div>
                                <h3 className="text-2xl font-semibold mb-3 text-gray-800">3. Peluncuran & Dukungan</h3>
                                <p className="text-gray-600">
                                    Setelah lulus uji, produk Anda siap diluncurkan, didukung penuh oleh tim kami.
                                </p>
                            </div>
                        </FadeInOnScroll>
                    </div>
                </div>
            </section>
        );

        const About = () => (
            <section id="about" className="py-20 bg-white">
                <div className="container mx-auto px-6">
                    <SectionTitle>Tentang Rex</SectionTitle>
                    <div className="grid md:grid-cols-2 gap-12 items-center">
                        <FadeInOnScroll>
                            <div className="relative rounded-xl overflow-hidden shadow-xl">
                                <img src="about.jpg" alt="Tentang Rex" className="w-full h-96 object-cover"/>
                                <div className="absolute inset-0 bg-black bg-opacity-20 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity duration-300">
                                    <p className="text-white text-3xl font-bold">Keindahan Abadi</p>
                                </div>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div>
                                <h3 className="text-3xl font-semibold mb-6 text-gray-800">Filosofi Kami</h3>
                                <p className="text-lg text-gray-600 leading-relaxed mb-6">
                                    Rex lahir dari keinginan untuk menciptakan sesuatu yang luar biasa, menggabungkan keanggunan minimalis dengan kekuatan fungsionalitas. Kami percaya bahwa keindahan sejati terletak pada kesederhanaan yang dieksekusi dengan sempurna.
                                </p>
                                <p className="text-lg text-gray-600 leading-relaxed">
                                    Setiap proyek Rex adalah manifestasi dari dedikasi kami terhadap kualitas, inovasi, dan kepuasan pelanggan. Kami tidak hanya membangun produk, kami menciptakan pengalaman yang tak terlupakan.
                                </p>
                            </div>
                        </FadeInOnScroll>
                    </div>
                </div>
            </section>
        );

        const Testimonials = () => (
            <section id="testimonials" className="py-20 bg-gray-100">
                <div className="container mx-auto px-6">
                    <SectionTitle>Apa Kata Mereka</SectionTitle>
                    <div className="grid md:grid-cols-3 gap-10">
                        <FadeInOnScroll>
                            <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-100 hover:shadow-xl transition-shadow duration-300">
                                <p className="text-gray-700 italic mb-6 text-lg">
                                    "Rex telah mengubah cara kami melihat desain. Kualitasnya luar biasa dan tim mereka sangat profesional. Sangat direkomendasikan!"
                                </p>
                                <div className="flex items-center">
                                    <div className="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold text-gray-600 mr-4">
                                        JD
                                    </div>
                                    <div>
                                        <p className="font-semibold text-gray-800">Joko Dwi</p>
                                        <p className="text-sm text-gray-500">CEO, Perusahaan Inovasi</p>
                                    </div>
                                </div>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-100 hover:shadow-xl transition-shadow duration-300">
                                <p className="text-gray-700 italic mb-6 text-lg">
                                    "Desain minimalis Rex benar-benar memukau dan fungsionalitasnya tak tertandingi. Ini adalah investasi terbaik yang pernah kami lakukan."
                                </p>
                                <div className="flex items-center">
                                    <div className="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold text-gray-600 mr-4">
                                        SA
                                    </div>
                                    <div>
                                        <p className="font-semibold text-gray-800">Siti Aminah</p>
                                        <p className="text-sm text-gray-500">Pendiri, Solusi Kreatif</p>
                                    </div>
                                </div>
                            </div>
                        </FadeInOnScroll>
                        <FadeInOnScroll>
                            <div className="bg-white p-8 rounded-xl shadow-lg border border-gray-100 hover:shadow-xl transition-shadow duration-300">
                                <p className="text-gray-700 italic mb-6 text-lg">
                                    "Dari awal hingga akhir, pengalaman dengan Rex sangat mulus. Hasilnya melebihi ekspektasi kami. Kualitas premium sejati!"
                                </p>
                                <div className="flex items-center">
                                    <div className="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center text-xl font-bold text-gray-600 mr-4">
                                        BW
                                    </div>
                                    <div>
                                        <p className="font-semibold text-gray-800">Budi Wijaya</p>
                                        <p className="text-sm text-gray-500">Manajer Proyek, Global Tech</p>
                                    </div>
                                </div>
                            </div>
                        </FadeInOnScroll>
                    </div>
                </div>
            </section>
        );

        const CallToAction = () => (
            <section className="py-20 bg-gradient-to-r from-gray-200 to-gray-300 text-center">
                <div className="container mx-auto px-6">
                    <FadeInOnScroll>
                        <h2 className="text-4xl md:text-5xl font-bold text-gray-800 mb-8">
                            Siap untuk Keunggulan yang Megah?
                        </h2>
                        <p className="text-xl md:text-2xl text-gray-700 mb-10 max-w-3xl mx-auto">
                            Jangan lewatkan kesempatan untuk merasakan perpaduan sempurna antara desain dan fungsionalitas.
                        </p>
                        <button className="btn-primary py-4 px-12 rounded-full text-xl font-semibold transform hover:scale-105 transition-transform duration-300">
                            Mulai Proyek Anda
                        </button>
                    </FadeInOnScroll>
                </div>
            </section>
        );

        const Footer = () => (
            <footer id="contact" className="footer-gradient text-white py-12">
                <div className="container mx-auto px-6 grid md:grid-cols-3 gap-10">
                    <div>
                        <h3 className="text-2xl font-bold mb-4">Rex</h3>
                        <p className="text-gray-300 leading-relaxed">
                            Menciptakan keindahan abadi melalui desain minimalis dan fungsionalitas superior.
                        </p>
                    </div>
                    <div>
                        <h3 className="text-2xl font-bold mb-4">Kontak Kami</h3>
                        <p className="text-gray-300 mb-2"><i className="fas fa-map-marker-alt mr-3"></i> Jl. Megah No. 123, Jakarta, Indonesia</p>
                        <p className="text-gray-300 mb-2"><i className="fas fa-phone mr-3"></i> +62 812 3456 7890</p>
                        <p className="text-gray-300"><i className="fas fa-envelope mr-3"></i> info@rex.com</p>
                    </div>
                    <div>
                        <h3 className="text-2xl font-bold mb-4">Ikuti Kami</h3>
                        <div className="flex space-x-6 text-2xl">
                            <a href="#" className="text-gray-300 hover:text-white transition-colors duration-300"><i className="fab fa-facebook-f"></i></a>
                            <a href="#" className="text-gray-300 hover:text-white transition-colors duration-300"><i className="fab fa-twitter"></i></a>
                            <a href="#" className="text-gray-300 hover:text-white transition-colors duration-300"><i className="fab fa-instagram"></i></a>
                            <a href="#" className="text-gray-300 hover:text-white transition-colors duration-300"><i className="fab fa-linkedin-in"></i></a>
                        </div>
                    </div>
                </div>
                <div className="text-center text-gray-400 mt-10 border-t border-gray-700 pt-8">
                    &copy; {new Date().getFullYear()} Rex. Hak Cipta Dilindungi Undang-Undang.
                </div>
            </footer>
        );

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
